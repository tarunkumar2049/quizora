{% extends "base.html" %}

{% block title %}Login | Quizora{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-5">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <div class="text-center mb-4">
                    <span class="badge text-bg-primary mb-2">Account Login</span>
                    <h1 class="h3 mb-1">Welcome back</h1>
                    <p class="text-muted mb-0">Sign in to continue to your dashboard.</p>
                </div>

                <form action="{{ url_for('auth.login') }}" method="POST" novalidate>
                    <div class="mb-3">
                        <label for="email" class="form-label">Email Address</label>
                        <input
                            type="email"
                            class="form-control"
                            id="email"
                            name="email"
                            value="{{ form_data.get('email', '') }}"
                            placeholder="name@example.com"
                            required
                        >
                    </div>

                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input
                            type="password"
                            class="form-control"
                            id="password"
                            name="password"
                            placeholder="Enter your password"
                            required
                        >
                    </div>

                    <div class="form-check mb-4">
                        <input class="form-check-input" type="checkbox" value="1" id="remember" name="remember">
                        <label class="form-check-label" for="remember">
                            Keep me signed in
                        </label>
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg">Login</button>
                    </div>
                </form>

                <p class="text-center text-muted mt-4 mb-0">
                    New to Quizora?
                    <a href="{{ url_for('auth.register') }}">Create an account</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
