{% extends "base.html" %}

{% block title %}Server Error | Quizora{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card shadow-sm border-0 text-center">
            <div class="card-body p-5">
                <span class="badge text-bg-danger mb-3">500</span>
                <h1 class="h3 mb-2">Something went wrong</h1>
                <p class="text-muted mb-4">The server could not complete this request. Please try again later.</p>
                <a class="btn btn-primary" href="{{ url_for('index') }}">Go home</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
